name: Mobile React Native Build

on:
  workflow_dispatch:
    inputs:
      app-directory:
        description: Relative path to the Expo app
        required: false
        default: .
        type: string
      node-version:
        description: Node.js version
        required: false
        default: "20"
        type: string
      run-eas-build:
        description: Trigger EAS cloud build
        required: false
        default: false
        type: boolean
      eas-profile:
        description: EAS build profile
        required: false
        default: preview
        type: string
      eas-platform:
        description: EAS build platform
        required: false
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      run-device-tests:
        description: Run device or emulator tests (Detox, Maestro, etc.)
        required: false
        default: false
        type: boolean
      run-eas-update:
        description: Publish an EAS Update after the build
        required: false
        default: false
        type: boolean
      submit-to-app-stores:
        description: Submit builds to Google Play and App Store Connect
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      app-directory:
        required: false
        default: .
        type: string
      node-version:
        required: false
        default: "20"
        type: string
      run-eas-build:
        required: false
        default: false
        type: boolean
      eas-profile:
        required: false
        default: preview
        type: string
      eas-platform:
        required: false
        default: all
        type: string
      run-device-tests:
        required: false
        default: false
        type: boolean
      run-eas-update:
        required: false
        default: false
        type: boolean
      submit-to-app-stores:
        required: false
        default: false
        type: boolean
    secrets:
      EXPO_TOKEN:
        required: false
      APPLE_ID:
        required: false
      APPLE_APP_SPECIFIC_PASSWORD:
        required: false
      GOOGLE_SERVICE_ACCOUNT_JSON:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Expo app files
        run: |
          test -f package.json || { echo "package.json not found in $(pwd)"; exit 1; }
          test -f app.json -o -f app.config.js -o -f app.config.ts || {
            echo "Expo config not found. Expected app.json, app.config.js, or app.config.ts."
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || github.event.inputs.node-version || '20' }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --ci

      - name: Expo Doctor
        run: npx expo-doctor

  device-tests:
    name: Device / Emulator Tests
    runs-on: macos-latest
    needs: quality
    if: ${{ inputs.run-device-tests || github.event.inputs.run-device-tests == 'true' }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || github.event.inputs.node-version || '20' }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Device tests placeholder
        run: |
          if npm run | rg -q 'test:device'; then
            npm run test:device
          else
            echo "No test:device script defined; skipping device test step."
          fi

  eas-build:
    name: EAS Build
    runs-on: ubuntu-latest
    needs: quality
    # if: ${{ (inputs.run-eas-build || github.event.inputs.run-eas-build == 'true') && secrets.EXPO_TOKEN != '' }}
    if: ${{ inputs.run-eas-build || github.event.inputs.run-eas-build == 'true' }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate EAS config
        run: |
          test -f package.json || { echo "package.json not found in $(pwd)"; exit 1; }
          test -f eas.json || { echo "eas.json not found in $(pwd)"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || github.event.inputs.node-version || '20' }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        run: |
          eas build \
            --non-interactive \
            --profile "${{ inputs.eas-profile || github.event.inputs.eas-profile || 'preview' }}" \
            --platform "${{ inputs.eas-platform || github.event.inputs.eas-platform || 'all' }}"

  eas-update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    needs: eas-build
    # if: ${{ (inputs.run-eas-update || github.event.inputs.run-eas-update == 'true') && secrets.EXPO_TOKEN != '' }}
    if: ${{ inputs.run-eas-update || github.event.inputs.run-eas-update == 'true' }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || github.event.inputs.node-version || '20' }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        run: |
          update_branch="${{ github.ref_name }}"
          if [ -z "$update_branch" ]; then
            update_branch="preview"
          fi
          eas update \
            --non-interactive \
            --branch "$update_branch" \
            --message "CI update from ${{ github.workflow }}" \
            --platform all

  store-submit:
    # name: Submit to App Stores
    name: Submit to App Stores (disabled)
    runs-on: ubuntu-latest
    needs: eas-build
    # Temporarily disabled.
    # if: ${{ (inputs.submit-to-app-stores || github.event.inputs.submit-to-app-stores == 'true') && secrets.EXPO_TOKEN != '' && secrets.GOOGLE_SERVICE_ACCOUNT_JSON != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
    if: ${{ false }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version || github.event.inputs.node-version || '20' }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.app-directory || github.event.inputs.app-directory || '.' }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # - name: Prepare Google Play credentials
      - name: Prepare Google Play credentials (disabled)
        run: |
          printf '%s' "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > "$PWD/google-play-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$PWD/google-play-sa.json"

      # - name: Submit to Google Play
      - name: Submit to Google Play (disabled)
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$PWD/google-play-sa.json"
          eas submit \
            --non-interactive \
            --platform android \
            --profile "${{ inputs.eas-profile || github.event.inputs.eas-profile || 'preview' }}"

      # - name: Submit to App Store Connect
      - name: Submit to App Store Connect (disabled)
        run: |
          eas submit \
            --non-interactive \
            --platform ios \
            --profile "${{ inputs.eas-profile || github.event.inputs.eas-profile || 'preview' }}" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --apple-app-specific-password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
