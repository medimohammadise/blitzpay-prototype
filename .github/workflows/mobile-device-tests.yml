name: Mobile Device Tests

on:
  workflow_call:
    inputs:
      app-directory:
        required: false
        default: ./mobile
        type: string

permissions:
  contents: read

jobs:
  device-tests:
    name: Device / Emulator Tests
    runs-on: macos-latest
    env:
      APP_DIR: ${{ inputs.app-directory }}
      NODE_VERSION: ${{ vars.MOBILE_NODE_VERSION || vars.NODE_VERSION || '20' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Device tests placeholder
        working-directory: ${{ env.APP_DIR }}
        run: |
          if [ -f "./scripts/device-tests.js" ]; then
            npm run test:device
          else
            echo "scripts/device-tests.js not found; skipping device test step."
          fi
