name: Manual release

on:
  workflow_dispatch:
    inputs:
      release_boundary:
        description: 'Tag to diff from (e.g. v1.2.3). Leave blank to use latest tag.'
        required: false
        default: ''
      base_branch:
        description: 'Branch to collect merged PRs from'
        required: false
        default: main

permissions:
  contents: write
  pull-requests: read

jobs:
  notes:
    uses: elegant-software/elegant-ci-cd-pipeline/.github/workflows/release-notes.yml@1f506dd1bd3686d6e31b3169977b2b672ff38a1a
    with:
      base_branch: ${{ inputs.base_branch }}
      release_boundary: ${{ inputs.release_boundary }}
    permissions:
      contents: write
      pull-requests: read

  summary:
    needs: notes
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print release decision
        run: |
          echo "release_required : ${{ needs.notes.outputs.release_required }}"
          echo "version_bump     : ${{ needs.notes.outputs.version_bump }}"
          echo "next_version     : ${{ needs.notes.outputs.next_version }}"
          echo "included PRs     : ${{ needs.notes.outputs.included_pr_count }}"
          echo "decision_reason  : ${{ needs.notes.outputs.decision_reason }}"

      - name: Print release notes
        if: needs.notes.outputs.release_required == 'true'
        run: |
          cat <<'EOF'
          ${{ needs.notes.outputs.release_notes_markdown }}
          EOF
